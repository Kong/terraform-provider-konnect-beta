                                    x-speakeasy-param-computed: false
                                type: object
                                x-speakeasy-param-computed: false
                              totalFailures:
                                description: >-
                                  In the default mode
                                  (outlierDetection.splitExternalAndLocalErrors
                                  is

                                  false) this detection type takes into account
                                  all generated errors:

                                  locally originated and externally originated
                                  (transaction) errors.

